name: watt_smart_meter
description: "WATT Smart Meter - Solar Energy Monitoring Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # Backend - Primary (Supabase)
  supabase_flutter: ^2.12.4

  # Backend - Fallback (Firebase)
  firebase_core: ^4.7.0
  firebase_database: ^12.3.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^21.0.0
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/watt_logo.jpg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/watt_logo.jpg"
    background_color: "#0A0A0A"
    theme_color: "#0A0A0A"

flutter_native_splash:
  color: "#0A0A0A"
  image: "assets/images/watt_logo.jpg"
  android_12:
    color: "#0A0A0A"
    image: "assets/images/watt_logo.jpg"
